---
name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  tests:
    uses: ./.github/workflows/go-build-and-test.yaml
    permissions:
      contents: read

  release:
    needs: tests
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to write releases

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set tag output
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Publish Release
        uses: kubernetes-sigs/release-actions/publish-release@8753ea6bdadb814d779c6ec34eaca689dbfb492b # v0.4.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sbom: false

      - name: Generate SBOM
        id: sbom
        uses: carabiner-dev/actions/unpack/sbom@94f29392187fe5082d1195a7d4cae3a7ddf09d9c # v1.2.1
        with:
          output-path: /tmp

      - name: Upload SBOM
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SBOM_FILES: ${{ steps.sbom.outputs.files }}
        run: |
          for f in ${SBOM_FILES}; do
            gh release upload ${{ steps.tag.outputs.tag_name }} "$f"
          done
