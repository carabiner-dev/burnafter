---
name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  tests:
    uses: ./.github/workflows/go-build-and-test.yaml
    permissions:
      contents: read

  release:
    needs: tests
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to write releases

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set tag output
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Publish Release
        uses: kubernetes-sigs/release-actions/publish-release@8753ea6bdadb814d779c6ec34eaca689dbfb492b # v0.4.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sbom: false

      - name: Generate SBOM
        id: sbom
        uses: carabiner-dev/actions/unpack/sbom@ba6f58b7120233bc312a76fb6bf3397704bcdcef # v1.1.5
        with:
          output-path: /tmp

      - name: Upload SBOM
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SBOM_FILES: ${{ steps.sbom.outputs.files }}
        run: |
          for f in ${SBOM_FILES}; do
            gh release upload ${{ steps.tag.outputs.tag_name }} "$f"
          done
