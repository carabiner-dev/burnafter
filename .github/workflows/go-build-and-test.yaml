name: go-tests

on:
  pull_request:
    branches:
      - "main"
  workflow_call: {}
  workflow_dispatch: {}

permissions: {} 

jobs:
  resolve-versions:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    outputs:
      go-versions: ${{ steps.matrix.outputs.go-versions }}
      
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Resolve Go versions
      id: go-versions
      uses: carabiner-dev/actions/go/versions@515c0fe38ee52c692f976c9f761b8acf6fb31cac # v1.1.3

    - name: Build version matrix
      id: matrix
      run: |
        echo "go-versions=[\"${{ steps.go-versions.outputs.GO_VERSION_STABLE }}\",\"${{ steps.go-versions.outputs.GO_VERSION_PREVIOUS }}\"]" >> "$GITHUB_OUTPUT"

  test:
    permissions:
      contents: read

    needs: resolve-versions
    name: Test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ${{ fromJSON(needs.resolve-versions.outputs.go-versions) }}
      fail-fast: false

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          persist-credentials: false

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}
        cache: false

    - name: Test
      run: |
        go get -d ./...
        go test -v ./...

    - name: Tests with race detector
      run: go test -race -v ./...

  verify-servers:
    needs: resolve-versions
    name: Verify Embedded Servers
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          persist-credentials: false

    - name: Resolve Go versions
      id: go-versions
      uses: carabiner-dev/actions/go/versions@515c0fe38ee52c692f976c9f761b8acf6fb31cac # v1.1.3

    - name: Verify .go-version matches latest stable
      run: |
        GO_VERSION_FILE=$(cat .go-version | tr -d '[:space:]')
        GO_VERSION_STABLE="${{ steps.go-versions.outputs.GO_VERSION_STABLE }}"
        if [ "$GO_VERSION_FILE" != "$GO_VERSION_STABLE" ]; then
          echo "Error: .go-version ($GO_VERSION_FILE) does not match latest stable Go version ($GO_VERSION_STABLE)"
          echo "Please update .go-version to $GO_VERSION_STABLE"
          exit 1
        fi
        echo "✓ .go-version ($GO_VERSION_FILE) matches latest stable"

    - name: Set up Go (latest stable)
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ steps.go-versions.outputs.GO_VERSION_STABLE }}
        cache: false

    - name: Build server binaries
      run: make servers

    - name: Check for uncommitted changes
      run: |
        if ! git diff --exit-code --quiet internal/embedded/servers/; then
          echo "Error: Embedded server binaries are out of date!"
          echo "Please run 'make servers' and commit the changes."
          echo ""
          echo "Changed files:"
          git diff --exit-code --name-only internal/embedded/servers
        fi

    - name: Verify embedded files exist
      run: |
        for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
          file="internal/embedded/servers/${platform}/burnafter-server.gz"
          if [ ! -f "$file" ]; then
            echo "Error: Missing embedded server binary: $file"
            exit 1
          fi
          echo "✓ Found: $file"
        done
